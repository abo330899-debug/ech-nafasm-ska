name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build main site
        env:
          BASE_PATH: /ech-nafasm-ska/
        run: pnpm --filter @workspace/nafsam run build

      - name: Build Telegram app
        env:
          BASE_PATH: /ech-nafasm-ska/telegram-call/
        run: pnpm --filter @workspace/telegram-call run build

      - name: Assemble GitHub Pages site
        run: |
          mkdir -p artifacts/nafsam/dist/public/telegram-call
          cp -R artifacts/telegram-call/dist/public/. artifacts/nafsam/dist/public/telegram-call/
          cp artifacts/nafsam/dist/public/index.html artifacts/nafsam/dist/public/404.html
          cp artifacts/telegram-call/dist/public/index.html artifacts/nafsam/dist/public/telegram-call/404.html
          touch artifacts/nafsam/dist/public/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/nafsam/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
