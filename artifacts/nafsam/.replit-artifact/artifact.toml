kind = "web"
previewPath = "/"
title = "Nafsam"
version = "1.0.0"
id = "artifacts/nafsam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 19579

[services.development]
run = "pnpm --filter @workspace/nafsam run dev"

[services.production]
build = ["sh", "-c", "pnpm --filter @workspace/nafsam run build && mkdir -p dist && cp -r artifacts/nafsam/dist/public/. dist/"]
publicDir = "dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19579"
BASE_PATH = "/"
